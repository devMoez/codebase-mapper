<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codebase Mapper 3D</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; color: #00d4ff; z-index: 10; pointer-events: none; }
        #controls { position: absolute; bottom: 10px; right: 10px; color: #fff; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        .node-label { background: rgba(0, 0, 0, 0.8); color: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid #00d4ff; font-size: 12px; }
    </style>
</head>
<body>
    <div id="info">
        <h2 style="margin: 0;">🌌 Codebase Mapper 3D</h2>
        <div id="status">Connecting to server...</div>
    </div>
    <div id="controls">
        <b>Left Click:</b> Rotate | <b>Right Click:</b> Pan | <b>Scroll:</b> Zoom<br>
        <b>Hover:</b> View Info | <b>Click Node:</b> Center
    </div>
    <div id="3d-graph"></div>

    <script>
        const statusEl = document.getElementById('status');
        const graphEl = document.getElementById('3d-graph');
        
        // Setup Three.js scene with stars
        const Graph = ForceGraph3D()(graphEl)
            .nodeLabel(node => `<div class="node-label"><b>${node.name}</b><br>${node.type}</div>`)
            .nodeAutoColorBy('type')
            .nodeRelSize(6)
            .linkDirectionalArrowLength(3.5)
            .linkDirectionalArrowRelPos(1)
            .nodeThreeObject(node => {
                const geometry = new THREE.SphereGeometry(node.type === 'folder' ? 5 : 3);
                const material = new THREE.MeshStandardMaterial({ 
                    color: node.type === 'folder' ? '#ff8c00' : '#ffd700',
                    emissive: node.type === 'folder' ? '#cc5500' : '#aa8800',
                    emissiveIntensity: 0.5
                });
                return new THREE.Mesh(geometry, material);
            })
            .onNodeClick(node => {
                const distance = 40;
                const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                Graph.cameraPosition(
                    { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
                    node,
                    3000
                );
            });

        // Add space background
        const scene = Graph.scene();
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff });
        const starVertices = [];
        for (let i = 0; i < 5000; i++) {
            const x = (Math.random() - 0.5) * 2000;
            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starVertices.push(x, y, z);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Add lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(ambientLight, directionalLight);

        async function loadGraph() {
            try {
                const response = await fetch('/api/graph');
                const data = await response.json();
                Graph.graphData(data);
                statusEl.innerText = `Connected: ${data.nodes.length} nodes`;
            } catch (err) {
                statusEl.innerText = 'Error loading graph data';
            }
        }

        const ws = new WebSocket(`ws://${location.host}`);
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'update') Graph.graphData(msg.graph);
            else if (msg.type === 'graph-progress') statusEl.innerText = `Indexing: ${Math.round((msg.current / msg.total) * 100)}%`;
            else if (msg.type === 'graph-error') { statusEl.innerText = `Error: ${msg.error}`; statusEl.style.color = '#ff4d4d'; }
        };

        loadGraph();
    </script>
</body>
</html>
